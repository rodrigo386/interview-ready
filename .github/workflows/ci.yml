name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Use staging Supabase if secrets are set; otherwise placeholders so the
      # build doesn't fail Zod validation on env. The smoke E2E tolerates
      # placeholder values (auth call is wrapped in try/catch on the landing).
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role' }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      MOCK_ANTHROPIC: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke (public pages, no DB needed)
        run: pnpm exec playwright test --project=smoke

      - name: E2E auth (full signup + prep flow, requires staging Supabase)
        if: ${{ env.NEXT_PUBLIC_SUPABASE_URL != 'https://placeholder.supabase.co' }}
        run: pnpm exec playwright test --project=auth

      - name: Cleanup stale E2E test users (>1 day old, best-effort)
        if: ${{ always() && env.NEXT_PUBLIC_SUPABASE_URL != 'https://placeholder.supabase.co' }}
        run: node scripts/cleanup-e2e-users.mjs

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
